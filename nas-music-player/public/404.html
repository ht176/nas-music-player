<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting to NAS Music Player</title>
  <script>
    // 重定向到正确的路径
    var path = window.location.pathname;
    if (path === '/' || path === '/nas-music-player/') {
      // 根路径，正常加载
    } else {
      // 其他路径，重定向到根路径
      window.location.href = '/nas-music-player/';
    }
  </script>
</head>
<body>
  <p>Loading NAS Music Player...</p>
</body>
</html>
